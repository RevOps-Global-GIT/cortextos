name: screenshot-evidence-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  screenshot-evidence-gate:
    name: screenshot-evidence-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gate script
        uses: actions/checkout@v4

      - name: Check screenshot evidence for style/UI changes
        uses: actions/github-script@v7
        with:
          script: |
            const runGate = require('./.github/scripts/screenshot-evidence-gate.cjs');
            await runGate({ github, context, core });
